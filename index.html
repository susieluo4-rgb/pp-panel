<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>萌宠乐园 · 家长面板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }
  .header { background: #fff; padding: 20px 20px 16px; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p  { font-size: 13px; color: #8e8e93; margin-top: 4px; }
  .section   { margin: 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 4px; }
  .card      { background: #fff; border-radius: 12px; overflow: hidden; }
  .task-row  { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f2f2f7; gap: 12px; }
  .task-row:last-child { border-bottom: none; }
  .task-icon { font-size: 28px; width: 40px; text-align: center; }
  .task-info { flex: 1; }
  .task-name { font-size: 16px; font-weight: 600; }
  .task-meta { font-size: 13px; color: #8e8e93; margin-top: 2px; }
  .status-badge { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-active   { background: #e5f0ff; color: #007aff; }
  .badge-pending  { background: #fff3e0; color: #ff9500; }
  .badge-approved { background: #e8f8e8; color: #34c759; }
  .badge-rejected { background: #ffe5e5; color: #ff3b30; }
  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-approve { background: #34c759; color: #fff; }
  .btn-reject  { background: #ff3b30; color: #fff; margin-right: 6px; }
  .btn-delete  { background: #f2f2f7; color: #ff3b30; font-size: 18px; padding: 6px 10px; }
  .add-form    { background: #fff; border-radius: 12px; padding: 16px; }
  .add-form label { display: block; font-size: 13px; font-weight: 600; color: #8e8e93; margin-bottom: 4px; margin-top: 12px; }
  .add-form label:first-child { margin-top: 0; }
  .add-form input, .add-form select { width: 100%; padding: 10px 12px; border: 1px solid #e5e5ea; border-radius: 8px; font-size: 16px; }
  .icon-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 8px; }
  .icon-btn  { font-size: 24px; padding: 6px; border: 2px solid transparent; border-radius: 8px; cursor: pointer; text-align: center; background: #f2f2f7; }
  .icon-btn.selected { border-color: #007aff; background: #e5f0ff; }
  .submit-btn { width: 100%; padding: 14px; background: #007aff; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .submit-btn:disabled { background: #c7c7cc; cursor: default; }
  .empty { text-align: center; padding: 40px 20px; color: #8e8e93; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: #8e8e93; font-size: 14px; }
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  /* 配置提示 */
  .config-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 14px; margin: 16px; font-size: 14px; line-height: 1.6; }
  .config-banner strong { color: #856404; }
  .config-banner code { background: #ffeaa7; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 13px; }
</style>
</head>
<body>

<!-- ⚠️ 配置提示（配置完成后可删掉这段） -->
<div class="config-banner" id="configBanner">
  <strong>📋 首次使用：请填入你的 Firebase 配置</strong><br>
  1. 打开 <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a><br>
  2. 选你的项目 → 点齿轮 ⚙️ → 「项目设置」→ 「网络应用」→ 点 &lt;/&gt; 图标添加网络应用<br>
  3. 复制 <code>firebaseConfig</code> 里的值，填到下方 JS 里<br>
  4. 保存文件，用浏览器打开即可
</div>

<div class="header">
  <h1>🐾 萌宠乐园 · 家长面板</h1>
  <p id="statusText">连接中…</p>
</div>

<!-- 新增任务 -->
<div class="section">
  <div class="section-title">新增任务</div>
  <div class="add-form">
    <label>任务名称</label>
    <input type="text" id="newTitle" placeholder="例：数学作业、整理书包" />

    <label>图标</label>
    <div class="icon-grid" id="iconGrid"></div>

    <label>类型</label>
    <select id="newType">
      <option value="study">📚 学习</option>
      <option value="chore">🧹 家务</option>
      <option value="exercise">🏃 运动</option>
      <option value="other">⭐️ 其他</option>
    </select>

    <label>金币奖励</label>
    <select id="newReward">
      <option value="1">1 🪙</option>
      <option value="2">2 🪙</option>
      <option value="3" selected>3 🪙</option>
      <option value="5">5 🪙</option>
      <option value="10">10 🪙</option>
    </select>

    <button class="submit-btn" id="addBtn" onclick="addTask()">＋ 添加任务</button>
  </div>
</div>

<!-- 待审批 -->
<div class="section" id="pendingSection" style="display:none">
  <div class="section-title">待审批 <span id="pendingCount"></span></div>
  <div class="card" id="pendingList"></div>
</div>

<!-- 所有任务 -->
<div class="section">
  <div class="section-title">所有任务</div>
  <div class="card" id="taskList">
    <div class="loading">加载中…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ✅ 把下面 firebaseConfig 替换成你自己的配置 -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⬇️ 把这里替换成你的 Firebase 配置 ⬇️
const firebaseConfig = {
  apiKey:            "AIzaSyDy4yJAz6qegHHO9mLERtPr3CN2eVuNQoE",
  authDomain:        "todolist-1cee1.firebaseapp.com",
  projectId:         "todolist-1cee1",
  storageBucket:     "todolist-1cee1.firebasestorage.app",
  messagingSenderId: "940068669351",
  appId:             "1:940068669351:web:e314368fe7a416518a9882",
  measurementId:     "G-NS4DBV09GL"
};
// ⬆️ 替换到这里为止 ⬆️

// 检测是否已配置
const isConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";
document.getElementById("statusText").textContent = isConfigured ? "已连接 Firebase" : "⚠️ 请先填入 Firebase 配置";
if (isConfigured) document.getElementById("configBanner").style.display = "none";

const app = isConfigured ? initializeApp(firebaseConfig) : null;
const db  = isConfigured ? getFirestore(app) : null;

// 图标选择
const icons = ["📚","✏️","📐","📖","🏃","🧹","🍽️","🌙","🎒","🎨","🎵","🌿","⚽️","🎯","🧩","🎮"];
let selectedIcon = "⭐️";
const iconGrid = document.getElementById("iconGrid");
icons.forEach(em => {
  const btn = document.createElement("div");
  btn.className = "icon-btn";
  btn.textContent = em;
  btn.onclick = () => {
    document.querySelectorAll(".icon-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedIcon = em;
  };
  iconGrid.appendChild(btn);
});
// 默认选中第一个
iconGrid.firstChild.classList.add("selected");
selectedIcon = icons[0];

// 实时监听任务
if (db) {
  const q = query(collection(db, "tasks"), orderBy("sortOrder"));
  onSnapshot(q, snapshot => {
    const tasks = [];
    snapshot.forEach(d => tasks.push({ id: d.id, ...d.data() }));
    renderTasks(tasks);
  }, err => {
    document.getElementById("statusText").textContent = "⚠️ 连接失败：" + err.message;
  });
}

function renderTasks(tasks) {
  const pending = tasks.filter(t => t.statusRaw === "pending");
  const pendingSection = document.getElementById("pendingSection");
  const pendingList    = document.getElementById("pendingList");
  const taskList       = document.getElementById("taskList");

  // 待审批区
  if (pending.length > 0) {
    pendingSection.style.display = "block";
    document.getElementById("pendingCount").textContent = `（${pending.length}）`;
    pendingList.innerHTML = pending.map(t => `
      <div class="task-row">
        <div class="task-icon">${t.icon || "⭐️"}</div>
        <div class="task-info">
          <div class="task-name">${t.title}</div>
          <div class="task-meta">🪙 ${t.rewardAmount} 金币</div>
        </div>
        <button class="btn btn-reject" onclick="rejectTask('${t.id}')">拒绝</button>
        <button class="btn btn-approve" onclick="approveTask('${t.id}')">通过 ✓</button>
      </div>`).join("");
  } else {
    pendingSection.style.display = "none";
  }

  // 全部任务
  if (tasks.length === 0) {
    taskList.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>还没有任务，在上方添加吧</div>`;
    return;
  }
  taskList.innerHTML = tasks.map(t => {
    const statusMap = { active:"active", pending:"pending", approved:"approved", rejected:"rejected" };
    const labelMap  = { active:"进行中", pending:"待审批", approved:"✓已通过", rejected:"已拒绝" };
    const cls  = statusMap[t.statusRaw] || "active";
    const label = labelMap[t.statusRaw] || "进行中";
    return `
      <div class="task-row">
        <div class="task-icon">${t.icon || "⭐️"}</div>
        <div class="task-info">
          <div class="task-name">${t.title}</div>
          <div class="task-meta">🪙 ${t.rewardAmount} · ${t.frequencyRaw === "daily" ? "每天" : "每周"}</div>
        </div>
        <span class="status-badge badge-${cls}">${label}</span>
        <button class="btn btn-delete" onclick="deleteTask('${t.id}')" title="删除">🗑</button>
      </div>`;
  }).join("");
}

// 新增任务
window.addTask = async function() {
  const title = document.getElementById("newTitle").value.trim();
  if (!title || !db) return;
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  try {
    await addDoc(collection(db, "tasks"), {
      title,
      icon:            selectedIcon,
      taskDescription: "",
      typeRaw:         document.getElementById("newType").value,
      frequencyRaw:    "daily",
      rewardAmount:    parseInt(document.getElementById("newReward").value),
      statusRaw:       "active",
      completedDate:   "",
      rejectionReason: "",
      sortOrder:       Date.now(),
      createdAt:       Date.now() / 1000,
    });
    document.getElementById("newTitle").value = "";
    showToast("✅ 任务已添加，Susie 的 iPad 马上看到");
  } catch(e) { showToast("❌ 添加失败: " + e.message); }
  btn.disabled = false;
};

// 审批通过
window.approveTask = async function(id) {
  if (!db) return;
  await updateDoc(doc(db, "tasks", id), { statusRaw: "approved" });
  showToast("✅ 已通过审批");
};

// 拒绝
window.rejectTask = async function(id) {
  const reason = prompt("拒绝理由（可选）：") || "";
  if (!db) return;
  await updateDoc(doc(db, "tasks", id), { statusRaw: "rejected", rejectionReason: reason });
  showToast("已拒绝");
};

// 删除
window.deleteTask = async function(id) {
  if (!confirm("确认删除这个任务？")) return;
  if (!db) return;
  await deleteDoc(doc(db, "tasks", id));
  showToast("🗑 已删除");
};

// Toast
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
</body>
</html>
