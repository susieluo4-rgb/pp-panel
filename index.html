<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>萌宠乐园 · 家长面板</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d97706" id="themeColorMeta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="萌宠家长">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  /* ===== 主题色板 ===== */
  :root,
  [data-theme="cream"] {
    --bg:            #fdf6e3;
    --card:          #fffdf5;
    --header-bg:     #fffaee;
    --border:        #f0e5cc;
    --text:          #5c4a2a;
    --text-secondary:#8b7355;
    --text-muted:    #b8a37a;
    --input-bg:      #fffaee;
    --input-bg-soft: #f7eed8;

    --accent:        #d97706;
    --accent-soft:   #fef3c7;
    --accent-text:   #92400e;
    --success:       #65a30d;
    --success-soft:  #ecfccb;
    --success-text:  #3f6212;
    --warning:       #f59e0b;
    --warning-soft:  #fef3c7;
    --warning-text:  #92400e;
    --danger:        #dc2626;
    --danger-soft:   #fee2e2;
    --danger-text:   #991b1b;

    --shadow:        0 1px 3px rgba(140,100,40,0.08);
    --theme-color:   #d97706;
  }
  [data-theme="ios"] {
    --bg:            #f2f2f7;
    --card:          #ffffff;
    --header-bg:     #ffffff;
    --border:        #e5e5ea;
    --text:          #1c1c1e;
    --text-secondary:#8e8e93;
    --text-muted:    #aeaeb2;
    --input-bg:      #ffffff;
    --input-bg-soft: #f2f2f7;

    --accent:        #007aff;
    --accent-soft:   #e5f0ff;
    --accent-text:   #007aff;
    --success:       #34c759;
    --success-soft:  #e8f8e8;
    --success-text:  #34c759;
    --warning:       #ff9500;
    --warning-soft:  #fff3e0;
    --warning-text:  #ff9500;
    --danger:        #ff3b30;
    --danger-soft:   #ffe5e5;
    --danger-text:   #ff3b30;

    --shadow:        none;
    --theme-color:   #007aff;
  }
  [data-theme="dark"] {
    --bg:            #000000;
    --card:          #1c1c1e;
    --header-bg:     #1c1c1e;
    --border:        #38383a;
    --text:          #ffffff;
    --text-secondary:#8e8e93;
    --text-muted:    #636366;
    --input-bg:      #2c2c2e;
    --input-bg-soft: #2c2c2e;

    --accent:        #0a84ff;
    --accent-soft:   rgba(10,132,255,0.18);
    --accent-text:   #0a84ff;
    --success:       #30d158;
    --success-soft:  rgba(48,209,88,0.18);
    --success-text:  #30d158;
    --warning:       #ff9f0a;
    --warning-soft:  rgba(255,159,10,0.18);
    --warning-text:  #ff9f0a;
    --danger:        #ff453a;
    --danger-soft:   rgba(255,69,58,0.18);
    --danger-text:   #ff453a;

    --shadow:        none;
    --theme-color:   #1c1c1e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.25s, color 0.25s; }

  .header { background: var(--header-bg); padding: 20px 20px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .header-text { flex: 1; min-width: 0; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p  { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .settings-btn { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--input-bg-soft); color: var(--text); font-size: 20px; cursor: pointer; display: grid; place-items: center; transition: background 0.2s; }
  .settings-btn:hover, .settings-btn:active { background: var(--accent-soft); }

  .section   { margin: 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 4px; }
  .card      { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .task-row  { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid var(--border); gap: 12px; }
  .task-row:last-child { border-bottom: none; }
  .task-icon { font-size: 28px; width: 40px; text-align: center; }
  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 16px; font-weight: 600; }
  .task-meta { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .status-badge { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .badge-active   { background: var(--accent-soft);  color: var(--accent-text); }
  .badge-pending  { background: var(--warning-soft); color: var(--warning-text); }
  .badge-approved { background: var(--success-soft); color: var(--success-text); }
  .badge-rejected { background: var(--danger-soft);  color: var(--danger-text); }

  .btn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-approve { background: var(--success); color: #fff; }
  .btn-reject  { background: var(--danger);  color: #fff; margin-right: 6px; }
  .btn-delete  { background: var(--input-bg-soft); color: var(--danger); font-size: 18px; padding: 6px 10px; }

  .add-form    { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); }
  .add-form label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; margin-top: 12px; }
  .add-form label:first-child { margin-top: 0; }
  .add-form input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 16px; background: var(--input-bg); color: var(--text); }
  /* ===== 按钮选择组（科目 / 金币 / 频率） ===== */
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .btn-chip { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--input-bg-soft); color: var(--text-secondary); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; user-select: none; -webkit-user-select: none; }
  .btn-chip:active { transform: scale(0.95); }
  .btn-chip.selected { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-text); }
  .btn-chip-coin { min-width: 44px; text-align: center; }

  .submit-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .submit-btn:disabled { background: var(--text-muted); cursor: default; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }

  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* ===== 设置面板 (Bottom Sheet) ===== */
  .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 100; }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--card); border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.3s cubic-bezier(.4,0,.2,1); z-index: 101; max-height: 80vh; overflow-y: auto; }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .sheet-section { margin-bottom: 24px; }
  .sheet-section:last-child { margin-bottom: 0; }
  .sheet-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .theme-card { padding: 14px 8px; border-radius: 12px; border: 2px solid var(--border); cursor: pointer; text-align: center; transition: border-color 0.15s, transform 0.1s; user-select: none; }
  .theme-card:active { transform: scale(0.97); }
  .theme-card.selected { border-color: var(--accent); }
  .theme-preview { width: 100%; height: 50px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .theme-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .theme-sub  { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .preview-cream { background: linear-gradient(135deg, #fdf6e3 0%, #fffdf5 100%); color: #d97706; border: 1px solid #f0e5cc; }
  .preview-ios   { background: linear-gradient(135deg, #f2f2f7 0%, #ffffff 100%); color: #007aff; border: 1px solid #e5e5ea; }
  .preview-dark  { background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%); color: #0a84ff; border: 1px solid #38383a; }
  .meta-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); padding: 6px 0; }
  .meta-row .v { color: var(--text); font-weight: 500; }

  /* ===== 常用任务库 ===== */
  .add-actions{display:flex; gap:8px;}
  .add-actions .submit-btn{flex:1;}
  .ghost-btn{background:var(--accent-soft) !important; color:var(--accent-text) !important;}
  .tpl-row{display:flex; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid var(--border);}
  .tpl-row:last-child{border-bottom:none;}
  .tpl-row input[type=checkbox]{width:22px; height:22px; flex:0 0 auto; accent-color:var(--accent);}
  .tpl-bar{display:flex; align-items:center; gap:12px; margin-top:10px; padding:0 4px;}
  .tpl-bar .submit-btn{flex:1; margin:0;}
  .tpl-selall{display:flex; align-items:center; gap:6px; font-size:14px; color:var(--text-secondary); white-space:nowrap; cursor:pointer;}
  .tpl-selall input{width:18px; height:18px; accent-color:var(--accent);}

  /* ===== 分栏 & 紧凑 ===== */
  .cols{max-width:1120px; margin:0 auto; display:flex; align-items:flex-start;}
  .col{flex:1 1 0; min-width:0;}
  @media(max-width:819px){ .cols{display:block; max-width:640px;} }
  .section{margin:12px;}
  .section-title{margin-bottom:6px;}
  .add-form{padding:14px;}
  .add-form label{margin-top:9px;}
  .submit-btn{padding:12px; margin-top:12px;}
  .task-row{padding:11px 14px;}
  .tpl-row{padding:9px 12px;}
  .section-title.with-action{display:flex; align-items:center; justify-content:space-between; padding-right:4px;}
  .btn-clear-all{background:var(--danger-soft); color:var(--danger); font-size:12px; font-weight:700; padding:5px 10px; border:none; border-radius:8px; cursor:pointer; text-transform:none; letter-spacing:0;}

  .dur-stepper{display:flex; align-items:center; gap:14px; background:var(--input-bg-soft); border:1.5px solid var(--border); border-radius:12px; padding:8px 16px; width:fit-content;}
  .dur-stepper button{width:36px; height:36px; border:none; border-radius:9px; background:var(--card); color:var(--accent); font-size:22px; font-weight:800; cursor:pointer; line-height:1;}
  .dur-stepper #durValue{font-size:19px; font-weight:800; min-width:38px; text-align:center;}
  .dur-unit{color:var(--text-secondary); font-size:14px;}
  .btn-edit{background:var(--accent-soft); color:var(--accent-text); font-size:16px; padding:6px 10px;}
  .tpl-group-head{font-size:12px; font-weight:800; color:var(--accent-text); background:var(--accent-soft); padding:6px 12px; border-bottom:1px solid var(--border);}
</style>
</head>
<body>

<div class="header">
  <div class="header-text">
    <h1>🐾 萌宠乐园 · 家长面板</h1>
    <p id="statusText">连接中…</p>
  </div>
  <button class="settings-btn" onclick="openSettings()" aria-label="设置">⚙️</button>
</div>

<main class="cols">
<div class="col">

<!-- 新增任务 -->
<div class="section">
  <div class="section-title">新增任务</div>
  <div class="add-form">
    <label>任务名称</label>
    <input type="text" id="newTitle" placeholder="例：英语默写、数学口算" onkeydown="if(event.key==='Enter'){event.preventDefault();addTask()}" />

    <label>科目</label>
    <div class="btn-group" id="typeGroup">
      <div class="btn-chip selected" data-val="english">英语</div>
      <div class="btn-chip" data-val="math">数学</div>
      <div class="btn-chip" data-val="chinese">语文</div>
      <div class="btn-chip" data-val="other">其他</div>
    </div>

    <label>频率</label>
    <div class="btn-group" id="freqGroup">
      <div class="btn-chip selected" data-val="daily">每天</div>
      <div class="btn-chip" data-val="once">临时</div>
    </div>

    <label>金币奖励</label>
    <div class="btn-group" id="coinGroup">
      <div class="btn-chip btn-chip-coin" data-val="1">1</div>
      <div class="btn-chip btn-chip-coin" data-val="2">2</div>
      <div class="btn-chip btn-chip-coin selected" data-val="3">3</div>
      <div class="btn-chip btn-chip-coin" data-val="5">5</div>
      <div class="btn-chip btn-chip-coin" data-val="8">8</div>
      <div class="btn-chip btn-chip-coin" data-val="10">10</div>
    </div>

    <label>预计时长</label>
    <div class="dur-stepper">
      <button type="button" onclick="adjustDur(-5)">−</button>
      <span id="durValue">20</span><span class="dur-unit">分钟</span>
      <button type="button" onclick="adjustDur(5)">＋</button>
    </div>

    <div class="add-actions">
      <button class="submit-btn" id="addBtn" onclick="addTask()">＋ 添加到今天</button>
      <button class="submit-btn ghost-btn" id="tplBtn" onclick="saveTemplate()">★ 存入常用库</button>
    </div>
  </div>
</div>

<!-- 常用任务库 -->
<div class="section">
  <div class="section-title">常用任务库 · 勾选后一键导入今天</div>
  <div class="card" id="tplList"><div class="loading">加载中…</div></div>
  <div class="tpl-bar">
    <label class="tpl-selall"><input type="checkbox" id="tplSelectAll" onclick="toggleAllTpl(this)"> 全选</label>
    <button class="submit-btn" id="importBtn" onclick="importSelected()">⬇️ 导入选中到今天</button>
  </div>
</div>

</div><!-- /col -->
<div class="col">

<!-- 待审批 -->
<div class="section" id="pendingSection" style="display:none">
  <div class="section-title">待审批 <span id="pendingCount"></span></div>
  <div class="card" id="pendingList"></div>
</div>

<!-- 所有任务 -->
<div class="section">
  <div class="section-title with-action">
    <span>所有任务</span>
    <button class="btn-clear-all" onclick="clearAllTasks()">🧹 清空全部</button>
  </div>
  <div class="card" id="taskList">
    <div class="loading">加载中…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

</div><!-- /col -->
</main>

<!-- 编辑常用任务 -->
<div class="sheet-backdrop" id="tplEditBackdrop" onclick="closeTplEdit()"></div>
<div class="sheet" id="tplEditSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">✏️ 编辑常用任务</div>
  <div class="add-form">
    <label>任务名称</label>
    <input type="text" id="editTitle" />
    <label>科目</label>
    <div class="btn-group" id="editTypeGroup">
      <div class="btn-chip" data-val="english">英语</div>
      <div class="btn-chip" data-val="math">数学</div>
      <div class="btn-chip" data-val="chinese">语文</div>
      <div class="btn-chip" data-val="other">其他</div>
    </div>
    <label>频率</label>
    <div class="btn-group" id="editFreqGroup">
      <div class="btn-chip" data-val="daily">每天</div>
      <div class="btn-chip" data-val="once">临时</div>
    </div>
    <label>金币奖励</label>
    <div class="btn-group" id="editCoinGroup">
      <div class="btn-chip btn-chip-coin" data-val="1">1</div>
      <div class="btn-chip btn-chip-coin" data-val="2">2</div>
      <div class="btn-chip btn-chip-coin" data-val="3">3</div>
      <div class="btn-chip btn-chip-coin" data-val="5">5</div>
      <div class="btn-chip btn-chip-coin" data-val="8">8</div>
      <div class="btn-chip btn-chip-coin" data-val="10">10</div>
    </div>
    <label>预计时长</label>
    <div class="dur-stepper">
      <button type="button" onclick="adjustEditDur(-5)">−</button>
      <span id="editDurValue">20</span><span class="dur-unit">分钟</span>
      <button type="button" onclick="adjustEditDur(5)">＋</button>
    </div>
    <button class="submit-btn" onclick="saveTplEdit()">保存修改</button>
  </div>
</div>

<!-- ===== 设置面板 ===== -->
<div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSettings()"></div>
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">⚙️ 设置</div>

  <div class="sheet-section">
    <div class="sheet-label">主题</div>
    <div class="theme-grid">
      <div class="theme-card" data-set-theme="cream">
        <div class="theme-preview preview-cream">🐾</div>
        <div class="theme-name">米黄</div>
        <div class="theme-sub">Cozy</div>
      </div>
      <div class="theme-card" data-set-theme="ios">
        <div class="theme-preview preview-ios">🐾</div>
        <div class="theme-name">iOS</div>
        <div class="theme-sub">Default</div>
      </div>
      <div class="theme-card" data-set-theme="dark">
        <div class="theme-preview preview-dark">🐾</div>
        <div class="theme-name">夜间</div>
        <div class="theme-sub">Dark</div>
      </div>
    </div>
  </div>

  <div class="sheet-section">
    <div class="sheet-label">关于</div>
    <div class="meta-row"><span>项目</span><span class="v">todolist-1cee1</span></div>
    <div class="meta-row"><span>版本</span><span class="v">v0.2 · 主题系统</span></div>
    <div class="meta-row"><span>项目地址</span><span class="v"><a href="https://github.com/susieluo4-rgb/pp-panel" target="_blank" style="color:var(--accent);text-decoration:none">github.com/.../pp-panel</a></span></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDy4yJAz6qegHHO9mLERtPr3CN2eVuNQoE",
  authDomain:        "todolist-1cee1.firebaseapp.com",
  projectId:         "todolist-1cee1",
  storageBucket:     "todolist-1cee1.firebasestorage.app",
  messagingSenderId: "940068669351",
  appId:             "1:940068669351:web:e314368fe7a416518a9882",
  measurementId:     "G-NS4DBV09GL"
};

document.getElementById("statusText").textContent = "已连接 Firebase";
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ===== 主题系统 =====
const THEME_KEY = "pp_panel_theme";
const VALID_THEMES = ["cream", "ios", "dark"];

function applyTheme(name) {
  const t = VALID_THEMES.includes(name) ? name : "cream";
  document.documentElement.setAttribute("data-theme", t);
  localStorage.setItem(THEME_KEY, t);
  // 标记选中态
  document.querySelectorAll("[data-set-theme]").forEach(el => {
    el.classList.toggle("selected", el.dataset.setTheme === t);
  });
  // 同步浏览器顶栏 theme-color
  const meta = document.getElementById("themeColorMeta");
  const colorMap = { cream: "#d97706", ios: "#007aff", dark: "#1c1c1e" };
  if (meta) meta.setAttribute("content", colorMap[t]);
}

// 初次加载：localStorage > 默认 cream
applyTheme(localStorage.getItem(THEME_KEY) || "cream");

// 点击主题卡片
document.querySelectorAll("[data-set-theme]").forEach(el => {
  el.addEventListener("click", () => applyTheme(el.dataset.setTheme));
});

// ===== 设置面板开关 =====
const backdrop = document.getElementById("sheetBackdrop");
const sheet    = document.getElementById("settingsSheet");
window.openSettings  = () => { backdrop.classList.add("show"); sheet.classList.add("show"); };
window.closeSettings = () => { backdrop.classList.remove("show"); sheet.classList.remove("show"); };

// ===== 科目 → 图标映射 =====
const typeIconMap = { english: "📖", math: "📐", chinese: "✏️", other: "⭐️" };

// ===== 按钮组通用逻辑 =====
function setupBtnGroup(groupId) {
  const group = document.getElementById(groupId);
  group.querySelectorAll(".btn-chip").forEach(chip => {
    chip.onclick = () => {
      group.querySelectorAll(".btn-chip").forEach(c => c.classList.remove("selected"));
      chip.classList.add("selected");
    };
  });
}
function getGroupVal(groupId) {
  const sel = document.getElementById(groupId).querySelector(".btn-chip.selected");
  return sel ? sel.dataset.val : "";
}
setupBtnGroup("typeGroup");
setupBtnGroup("freqGroup");
setupBtnGroup("coinGroup");

let curDur = 20;
window.adjustDur = function(d){
  curDur = Math.min(180, Math.max(5, curDur + d));
  document.getElementById("durValue").textContent = curDur;
};

// ===== 实时监听任务 =====
let latestTasks = [];
const q = query(collection(db, "tasks"), orderBy("sortOrder"));
onSnapshot(q, snapshot => {
  const tasks = [];
  snapshot.forEach(d => tasks.push({ id: d.id, ...d.data() }));
  latestTasks = tasks;
  renderTasks(tasks);
}, err => {
  document.getElementById("statusText").textContent = "⚠️ 连接失败：" + err.message;
});

function renderTasks(tasks) {
  const pending = tasks.filter(t => t.statusRaw === "pending");
  const pendingSection = document.getElementById("pendingSection");
  const pendingList    = document.getElementById("pendingList");
  const taskList       = document.getElementById("taskList");

  if (pending.length > 0) {
    pendingSection.style.display = "block";
    document.getElementById("pendingCount").textContent = `（${pending.length}）`;
    pendingList.innerHTML = pending.map(t => `
      <div class="task-row">
        <div class="task-icon">${t.icon || "⭐️"}</div>
        <div class="task-info">
          <div class="task-name">${t.title}</div>
          <div class="task-meta">🪙 ${t.rewardAmount} 金币</div>
        </div>
        <button class="btn btn-reject" onclick="rejectTask('${t.id}')">拒绝</button>
        <button class="btn btn-approve" onclick="approveTask('${t.id}')">通过 ✓</button>
      </div>`).join("");
  } else {
    pendingSection.style.display = "none";
  }

  if (tasks.length === 0) {
    taskList.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>还没有任务，在上方添加吧</div>`;
    return;
  }
  taskList.innerHTML = tasks.map(t => {
    const statusMap = { active:"active", pending:"pending", approved:"approved", rejected:"rejected" };
    const labelMap  = { active:"进行中", pending:"待审批", approved:"✓已通过", rejected:"已拒绝" };
    const cls   = statusMap[t.statusRaw] || "active";
    const label = labelMap[t.statusRaw]  || "进行中";
    return `
      <div class="task-row">
        <div class="task-icon">${t.icon || "⭐️"}</div>
        <div class="task-info">
          <div class="task-name">${t.title}</div>
          <div class="task-meta">🪙 ${t.rewardAmount} · ⏱ ${t.estMinutes || 20}分 · ${t.frequencyRaw === "daily" ? "每天" : t.frequencyRaw === "once" ? "临时" : "每周"}</div>
        </div>
        <span class="status-badge badge-${cls}">${label}</span>
        <button class="btn btn-delete" onclick="deleteTask('${t.id}')" title="删除">🗑</button>
      </div>`;
  }).join("");
}

window.addTask = async function() {
  const title = document.getElementById("newTitle").value.trim();
  if (!title) return;
  const typeVal = getGroupVal("typeGroup");
  const freqVal = getGroupVal("freqGroup");
  const coinVal = parseInt(getGroupVal("coinGroup")) || 3;
  const durVal = curDur;
  const icon = typeIconMap[typeVal] || "⭐️";
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  try {
    await addDoc(collection(db, "tasks"), {
      title,
      icon,
      taskDescription: "",
      typeRaw:         typeVal,
      frequencyRaw:    freqVal === "once" ? "once" : "daily",
      rewardAmount:    coinVal,
      estMinutes:      durVal,
      statusRaw:       "active",
      completedDate:   "",
      rejectionReason: "",
      sortOrder:       Date.now(),
      createdAt:       Date.now() / 1000,
    });
    document.getElementById("newTitle").value = "";
    document.getElementById("newTitle").focus();
    showToast("✅ 任务已添加，Susie 的 iPad 马上看到");
  } catch(e) { showToast("❌ 添加失败: " + e.message); }
  btn.disabled = false;
};

window.approveTask = async function(id) {
  await updateDoc(doc(db, "tasks", id), { statusRaw: "approved" });
  showToast("✅ 已通过审批");
};

window.rejectTask = async function(id) {
  const reason = prompt("拒绝理由（可选）：") || "";
  await updateDoc(doc(db, "tasks", id), { statusRaw: "rejected", rejectionReason: reason });
  showToast("已拒绝");
};

window.clearAllTasks = async function() {
  if (latestTasks.length === 0) { showToast("\u6ca1\u6709\u4efb\u52a1\u53ef\u6e05\u7a7a"); return; }
  if (!confirm("\u786e\u5b9a\u6e05\u7a7a\u5168\u90e8 " + latestTasks.length + " \u4e2a\u4efb\u52a1\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u64a4\u9500\uff08\u4e0d\u5f71\u54cd\u5e38\u7528\u4efb\u52a1\u5e93\uff09")) return;
  try {
    for (const t of [...latestTasks]) { await deleteDoc(doc(db, "tasks", t.id)); }
    showToast("\ud83e\uddf9 \u5df2\u6e05\u7a7a\u6240\u6709\u4efb\u52a1");
  } catch(e){ showToast("\u274c \u6e05\u7a7a\u5931\u8d25: " + e.message); }
};

window.deleteTask = async function(id) {
  if (!confirm("确认删除这个任务？")) return;
  await deleteDoc(doc(db, "tasks", id));
  showToast("🗑 已删除");
};

// ===== 常用任务库 =====
let templates = [];

window.saveTemplate = async function() {
  const title = document.getElementById("newTitle").value.trim();
  if (!title) { showToast("先填任务名称"); return; }
  const typeVal = getGroupVal("typeGroup");
  const coinVal = parseInt(getGroupVal("coinGroup")) || 3;
  const durVal = curDur;
  const freqVal = getGroupVal("freqGroup");
  const icon = typeIconMap[typeVal] || "\u2b50\ufe0f";
  const btn = document.getElementById("tplBtn"); btn.disabled = true;
  try {
    await addDoc(collection(db, "templates"), {
      title, icon, typeRaw: typeVal, rewardAmount: coinVal, estMinutes: durVal, frequencyRaw: freqVal === "once" ? "once" : "daily",
      sortOrder: Date.now(), createdAt: Date.now()/1000,
    });
    document.getElementById("newTitle").value = "";
    showToast("\u2605 \u5df2\u5b58\u5165\u5e38\u7528\u5e93");
  } catch(e){ showToast("\u274c \u5b58\u5165\u5931\u8d25: " + e.message); }
  btn.disabled = false;
};

const tplQ = query(collection(db, "templates"), orderBy("sortOrder"));
onSnapshot(tplQ, snap => {
  templates = []; snap.forEach(d => templates.push({ id:d.id, ...d.data() }));
  renderTemplates();
}, err => {});

function renderTemplates() {
  const box = document.getElementById("tplList");
  const selAll = document.getElementById("tplSelectAll");
  if (templates.length === 0) {
    box.innerHTML = `<div class="empty"><div class="empty-icon">⭐️</div>还没有常用任务。在上方填好后点「★ 存入常用库」</div>`;
    if (selAll) selAll.checked = false;
    return;
  }
  const groups = [
    { key: "english", name: "英语", icon: "📖" },
    { key: "math",    name: "数学", icon: "📐" },
    { key: "chinese", name: "语文", icon: "✏️" },
    { key: "other",   name: "其他", icon: "⭐️" },
  ];
  const known = ["english", "math", "chinese", "other"];
  const bucket = t => known.includes(t.typeRaw) ? t.typeRaw : "other";
  const rowHtml = t => `
    <div class="tpl-row">
      <input type="checkbox" class="tpl-check" data-id="${t.id}">
      <div class="task-icon">${t.icon || "⭐️"}</div>
      <div class="task-info">
        <div class="task-name">${t.title}</div>
        <div class="task-meta">🪙 ${t.rewardAmount} · ⏱ ${t.estMinutes || 20}分 · ${t.frequencyRaw === "once" ? "临时" : "每天"}</div>
      </div>
      <button class="btn btn-edit" onclick="openTplEdit('${t.id}')" title="修改">✏️</button>
      <button class="btn btn-delete" onclick="deleteTemplate('${t.id}')" title="从常用库删除">🗑</button>
    </div>`;
  let html = "";
  for (const g of groups) {
    const items = templates.filter(t => bucket(t) === g.key);
    if (items.length === 0) continue;
    html += `<div class="tpl-group-head">${g.icon} ${g.name}（${items.length}）</div>`;
    html += items.map(rowHtml).join("");
  }
  box.innerHTML = html;
  if (selAll) selAll.checked = false;
}

window.toggleAllTpl = function(box) {
  document.querySelectorAll(".tpl-check").forEach(c => c.checked = box.checked);
};

window.deleteTemplate = async function(id) {
  if (!confirm("\u4ece\u5e38\u7528\u5e93\u5220\u9664\u8fd9\u6761\uff1f\uff08\u4e0d\u5f71\u54cd\u4eca\u5929\u5df2\u5bfc\u5165\u7684\u4efb\u52a1\uff09")) return;
  await deleteDoc(doc(db, "templates", id));
  showToast("\ud83d\uddd1 \u5df2\u4ece\u5e38\u7528\u5e93\u5220\u9664");
};

window.importSelected = async function() {
  const checked = [...document.querySelectorAll(".tpl-check:checked")].map(c => c.dataset.id);
  if (checked.length === 0) { showToast("\u5148\u52fe\u9009\u8981\u5bfc\u5165\u7684\u4efb\u52a1"); return; }
  const btn = document.getElementById("importBtn"); btn.disabled = true;
  let n = 0;
  try {
    for (const id of checked) {
      const t = templates.find(x => x.id === id); if (!t) continue;
      await addDoc(collection(db, "tasks"), {
        title: t.title, icon: t.icon || "\u2b50\ufe0f", taskDescription: "",
        typeRaw: t.typeRaw || "other", frequencyRaw: t.frequencyRaw || "once",
        rewardAmount: t.rewardAmount || 3, estMinutes: t.estMinutes || 20, statusRaw: "active",
        completedDate: "", rejectionReason: "",
        sortOrder: Date.now() + n, createdAt: Date.now()/1000,
      });
      n++;
    }
    document.querySelectorAll(".tpl-check").forEach(c => c.checked = false);
    const selAll = document.getElementById("tplSelectAll"); if (selAll) selAll.checked = false;
    showToast("\u2b07\ufe0f \u5df2\u5bfc\u5165 " + n + " \u4e2a\u4efb\u52a1\u5230\u4eca\u5929");
  } catch(e){ showToast("\u274c \u5bfc\u5165\u5931\u8d25: " + e.message); }
  btn.disabled = false;
};

// ===== 常用库编辑 =====
setupBtnGroup("editTypeGroup");
setupBtnGroup("editFreqGroup");
setupBtnGroup("editCoinGroup");
let editingTplId = null;
let editDur = 20;

function setGroupVal(groupId, val) {
  document.getElementById(groupId).querySelectorAll(".btn-chip").forEach(c => {
    c.classList.toggle("selected", c.dataset.val === String(val));
  });
}
window.adjustEditDur = function(d) {
  editDur = Math.min(180, Math.max(5, editDur + d));
  document.getElementById("editDurValue").textContent = editDur;
};
window.openTplEdit = function(id) {
  const t = templates.find(x => x.id === id); if (!t) return;
  editingTplId = id;
  document.getElementById("editTitle").value = t.title || "";
  setGroupVal("editTypeGroup", t.typeRaw || "other");
  setGroupVal("editFreqGroup", t.frequencyRaw === "once" ? "once" : "daily");
  setGroupVal("editCoinGroup", t.rewardAmount || 3);
  editDur = t.estMinutes || 20;
  document.getElementById("editDurValue").textContent = editDur;
  document.getElementById("tplEditBackdrop").classList.add("show");
  document.getElementById("tplEditSheet").classList.add("show");
};
window.closeTplEdit = function() {
  document.getElementById("tplEditBackdrop").classList.remove("show");
  document.getElementById("tplEditSheet").classList.remove("show");
  editingTplId = null;
};
window.saveTplEdit = async function() {
  if (!editingTplId) return;
  const title = document.getElementById("editTitle").value.trim();
  if (!title) { showToast("任务名称不能为空"); return; }
  const typeVal = getGroupVal("editTypeGroup") || "other";
  const freqVal = getGroupVal("editFreqGroup");
  const coinVal = parseInt(getGroupVal("editCoinGroup")) || 3;
  const icon = typeIconMap[typeVal] || "\u2b50\ufe0f";
  try {
    await updateDoc(doc(db, "templates", editingTplId), {
      title, icon, typeRaw: typeVal,
      frequencyRaw: freqVal === "once" ? "once" : "daily",
      rewardAmount: coinVal, estMinutes: editDur,
    });
    closeTplEdit();
    showToast("\u2705 \u5df2\u4fdd\u5b58\u4fee\u6539");
  } catch(e) { showToast("\u274c \u4fdd\u5b58\u5931\u8d25: " + e.message); }
};

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
